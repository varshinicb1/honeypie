name: Bug report
description: Report a reproducible HoneyPie bug
title: "bug: "
labels: ["bug", "needs-triage"]
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What went wrong?
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Reproduction
      description: Exact commands, project type, and relevant config.
      placeholder: |
        pnpm build
        honeypie run --yes --local-only
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - core
        - cli
        - builder
        - explorer
        - vision
        - renderer
        - publisher
        - plugin-sdk
        - docs
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: OS, Node, pnpm, Flutter/Android tooling, and whether `honeypie doctor` passes.
    validations:
      required: true

name: Feature request
description: Propose a scoped feature or plugin
title: "feat: "
labels: ["enhancement", "needs-triage"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What workflow should HoneyPie improve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposal
      description: Describe the smallest useful version.
    validations:
      required: true
  - type: dropdown
    id: plugin
    attributes:
      label: Plugin surface
      options:
        - FrameworkDetector
        - ExplorationStrategy
        - VisionScorer
        - Copywriter
        - RenderTheme
        - ExportTarget
        - Not a plugin
    validations:
      required: true

name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-release:
    name: Build Standalone Binaries
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.33.4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Package Executable
        run: |
          npx pkg packages/cli/package.json --targets node22-win-x64 --output dist/honeypie.exe

      - name: Setup Node Sidecar for Desktop App
        run: |
          node -e "const fs = require('fs'); fs.mkdirSync('apps/desktop/src-tauri/binaries', { recursive: true }); fs.copyFileSync(process.execPath, 'apps/desktop/src-tauri/binaries/node-x86_64-pc-windows-msvc.exe')"

      - name: Build Tauri Desktop MSI
        run: |
          pnpm --filter desktop exec tauri build --bundles msi

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/honeypie.exe
            apps/desktop/src-tauri/target/release/bundle/msi/*.msi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

